name: nekohub

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nekohub}
      POSTGRES_USER: ${POSTGRES_USER:-nekohub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nekohub-dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nekohub} -d ${POSTGRES_DB:-nekohub}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # Local storage + PostgreSQL (default)
  nekohub:
    build: .
    image: ${NEKOHUB_IMAGE:-ghcr.io/fengying1314/nekohub:latest}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5121:8080"
    environment:
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      Persistence__Database__Provider: ${Persistence__Database__Provider:-postgresql}
      Persistence__Database__ConnectionString: ${Persistence__Database__ConnectionString:-Host=postgres;Port=5432;Database=nekohub;Username=nekohub;Password=nekohub-dev;Pooling=true}
      Auth__ApiKey__Enabled: ${Auth__ApiKey__Enabled:-true}
      Auth__ApiKey__Keys__0: ${Auth__ApiKey__Keys__0:-change-this-api-key-in-production}
      Storage__Provider: local
      Storage__Local__RootPath: ${Storage__Local__RootPath:-/app/storage/assets}
      Storage__PublicBaseUrl: ${Storage__PublicBaseUrl:-http://localhost:5121/content}
    volumes:
      - ./data:/app/storage
    restart: unless-stopped

  # 前端管理面板（Vue 3）
  nekohub-web:
    build:
      context: ./web/nekohub-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${FRONTEND_VITE_API_BASE_URL:-http://localhost:5121}
        VITE_MAX_UPLOAD_SIZE_BYTES: ${FRONTEND_VITE_MAX_UPLOAD_SIZE_BYTES:-10485760}
    depends_on:
      - nekohub
    ports:
      - "${FRONTEND_PORT:-5173}:4173"
    restart: unless-stopped

  # S3-compatible 示例（配合 MinIO，仍使用 PostgreSQL 持久化）
  nekohub-s3:
    build: .
    image: ${NEKOHUB_IMAGE:-ghcr.io/fengying1314/nekohub:latest}
    profiles: ["s3"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_started
    ports:
      - "5122:8080"
    environment:
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      Persistence__Database__Provider: ${Persistence__Database__Provider:-postgresql}
      Persistence__Database__ConnectionString: ${Persistence__Database__ConnectionString:-Host=postgres;Port=5432;Database=nekohub;Username=nekohub;Password=nekohub-dev;Pooling=true}
      Auth__ApiKey__Enabled: ${Auth__ApiKey__Enabled:-true}
      Auth__ApiKey__Keys__0: ${Auth__ApiKey__Keys__0:-change-this-api-key-in-production}
      Storage__Provider: s3
      Storage__S3__ProviderName: ${Storage__S3__ProviderName:-s3}
      Storage__S3__Endpoint: ${Storage__S3__Endpoint:-http://minio:9000}
      Storage__S3__Bucket: ${Storage__S3__Bucket:-nekohub}
      Storage__S3__Region: ${Storage__S3__Region:-us-east-1}
      Storage__S3__AccessKey: ${Storage__S3__AccessKey:-minioadmin}
      Storage__S3__SecretKey: ${Storage__S3__SecretKey:-minioadmin}
      Storage__S3__ForcePathStyle: ${Storage__S3__ForcePathStyle:-true}
      Storage__S3__PublicBaseUrl: ${Storage__S3__PublicBaseUrl:-http://localhost:9000/nekohub}
    volumes:
      - ./data:/app/storage
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    profiles: ["s3"]
    command: server /data --address :9000 --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-02-15T10-36-16Z
    profiles: ["s3"]
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${Storage__S3__Bucket:-nekohub}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until /usr/bin/mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          echo "waiting for minio to be ready..."
          sleep 2
        done
        /usr/bin/mc mb -p "local/$$MINIO_BUCKET" || true
        /usr/bin/mc anonymous set download "local/$$MINIO_BUCKET" || true

volumes:
  postgres-data:
